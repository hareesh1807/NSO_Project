global
    log stdout local0
    log stdout local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Frontend for Flask service (port 5000)
frontend flask_frontend
    bind *:5000
    default_backend flask_backend
    mode http
    option httpclose
    option forwardfor

# Backend for Flask service nodes
backend flask_backend
    balance roundrobin
    mode http
    option httpchk GET /
    timeout connect 5000
    timeout server 50000

# Frontend for SNMP (UDP port 6000)
frontend snmp_frontend
    bind *:6000
    default_backend snmp_backend
    mode tcp

# Backend for SNMP
backend snmp_backend
    balance roundrobin
    mode tcp

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s