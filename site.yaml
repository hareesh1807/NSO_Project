---
- name: Configure all nodes
  hosts: all
  become: yes
  gather_facts: yes
  
  vars:
    python_version: "3"
    flask_port: 5000
    service_user: "ubuntu"
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    - name: Upgrade all packages
      apt:
        upgrade: dist
    
    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - net-tools
          - htop
          - tmux
          - openssh-client
          - openssh-server
        state: present
    
    - name: Install Python and pip
      apt:
        name:
          - "python{{ python_version }}"
          - "python{{ python_version }}-pip"
          - "python{{ python_version }}-venv"
          - python3-dev
          - build-essential
        state: present
    
    - name: Install monitoring tools
      apt:
        name:
          - snmp
          - snmpd
          - sysstat
        state: present
    
    - name: Create application directory
      file:
        path: /opt/nso-service
        state: directory
        owner: "{{ service_user }}"
        group: "{{ service_user }}"
        mode: '0755'
    
    - name: Copy application2.py to all nodes
      copy:
        src: ./application2.py
        dest: /opt/nso-service/application2.py
        owner: "{{ service_user }}"
        group: "{{ service_user }}"
        mode: '0755'
    
    - name: Install Flask and dependencies
      pip:
        name:
          - flask>=2.0.0
          - psutil>=5.8.0
          - gunicorn>=20.1.0
        state: present
        executable: "pip{{ python_version }}"
    
    - name: Create Flask systemd service
      copy:
        src: ./my_flask_app.service
        dest: /etc/systemd/system/my_flask_app.service
        owner: root
        group: root
        mode: '0644'
    
    - name: Enable Flask service
      systemd:
        name: my_flask_app
        enabled: yes
        daemon_reload: yes
    
    - name: Start Flask service
      systemd:
        name: my_flask_app
        state: started
      ignore_errors: yes
    
    - name: Configure SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
      notify: restart sshd
    
    - name: Allow SSH through firewall
      ufw:
        rule: allow
        port: '22'
        proto: tcp
    
    - name: Allow HTTP through firewall
      ufw:
        rule: allow
        port: '80'
        proto: tcp
    
    - name: Allow HTTPS through firewall
      ufw:
        rule: allow
        port: '443'
        proto: tcp
    
    - name: Allow Flask port through firewall
      ufw:
        rule: allow
        port: "{{ flask_port }}"
        proto: tcp

    - name: Enable UFW firewall
      ufw:
        state: enabled
        policy: deny
        direction: incoming
    
    - name: Copy snmpd.conf
      copy:
        src: ./snmpd.conf
        dest: /etc/snmp/snmpd.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart snmpd
    
    - name: Install NTP
      apt:
        name: ntp
        state: present
    
    - name: Enable NTP service
      systemd:
        name: ntp
        enabled: yes
        state: started
    
    - name: Verify Flask service is running
      uri:
        url: "http://localhost:{{ flask_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200
      ignore_errors: yes
    
    - name: Print node info
      debug:
        msg: "Node {{ ansible_hostname }} configured successfully"

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted
    
    - name: restart snmpd
      systemd:
        name: snmpd
        state: restarted

# Configure proxy node specifically
- name: Configure proxy node
  hosts: haproxy
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
    
    - name: Copy nginx.conf
      copy:
        src: ./nginx.conf
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'
      notify: restart nginx
    
    - name: Enable Nginx service
      systemd:
        name: nginx
        enabled: yes
        state: started
    
    - name: Verify Nginx is running
      uri:
        url: "http://localhost/health"
        method: GET
        status_code: 200
      retries: 5
      delay: 5
      ignore_errors: yes
  
  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted

# Configure bastion node specifically
- name: Configure bastion node
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Install monitoring tools on bastion
      apt:
        name:
          - nagios-plugins
          - nagios-nrpe-server
        state: present
    
    - name: Create bastion scripts directory
      file:
        path: /opt/bastion
        state: directory
        mode: '0755'
    
    - name: Print bastion info
      debug:
        msg: " Bastion node {{ ansible_hostname }} configured successfully"